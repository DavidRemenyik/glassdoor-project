version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: glassdoor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: glassdoor
      MYSQL_USER: biguser
      MYSQL_PASSWORD: bigpw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

